resources:
  repositories:
    - repository: Templates
      type: git
      name: felles-pipeline-templates
      ref: develop

trigger:
  batch: true
  branches:
    include:
      - develop
      - feature/*
      - feat/*
      - refactor/*
      - bug/*
      - devops/*
      - fix/*
      - test/*
  paths:
    include:
      - src

pool:
  vmImage: "ubuntu-latest"

variables:
  NUGET_PLUGIN_HANDSHAKE_TIMEOUT_IN_SECONDS: 120
  NUGET_PLUGIN_REQUEST_TIMEOUT_IN_SECONDS: 120
  NUGET_PACKAGES: $(Pipeline.Workspace)/.nuget/packages

jobs:
  - job: Build
    steps:
      - template: dotnet/build-dotnetcore-pipeline-template-dotnet8.yml@Templates
        parameters:
          solutionPath: "src/Brevgenerator.sln"
          cloudformationTemplatePath: "src"
          nugetConfigPath: "src/nuget.config"
          stackParameters: >-
            env=sandbox
