pool:
  vmImage: "ubuntu-latest"

resources:
  repositories:
    - repository: Templates
      type: git
      name: felles-pipeline-templates
      ref: develop

trigger:
  batch: true
  branches:
    include:
      - develop

variables:
  - group: brevgenerator2

steps:
  - checkout: self
    fetchDepth: 0
    persistCredentials: true

  - script: |
      mkdir -p ~/.ssh
      echo "$(GITHUB_DEPLOY_KEY_PRIVATE)" > ~/.ssh/id_ed25519
      chmod 600 ~/.ssh/id_ed25519
      ssh-keyscan -t rsa github.com >> ~/.ssh/known_hosts

      git config --global user.name "Azure DevOps pipeline"
      git config --global user.email "grunde.thorheim@arbeidstilsynet.no"
      git remote add github git@github.com:Arbeidstilsynet/brevgen2.git
      git push github HEAD:main
    displayName: "Mirror to GitHub"
