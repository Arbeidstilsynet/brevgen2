pool:
  vmImage: "ubuntu-latest"

resources:
  repositories:
    - repository: Templates
      type: git
      name: felles-pipeline-templates
      ref: develop

trigger:
  batch: true
  tags:
    include:
      - "brevgenerator2-v*"

variables:
  - group: brevgenerator2

stages:
  - stage: Brevgen2DeployValid
    displayName: Valid
    jobs:
      - template: templates/brevgen2-deploy.yml
        parameters:
          env: test
          awsCredentialsApi: TestDeploy
          awsCredentialsWeb: TestPubDeploy
          region: eu-west-1
          infraBucketApi: "infra-test-deploy-bucket"
          infraBucketWeb: "infra-test-deploy-pub-bucket"
          chromiumLayerBucket: test-brevgenerator2-lambda-layers
          chromiumVersion: "133.0.0"
          imageName: test-brevgenerator2-web
          stackParametersApi: >-
            Env=test
            DomainName=brevgenerator2-api-valid.arbeidstilsynet.no
            CrossAccountRoute53RoleArn=arn:aws:iam::250640723606:role/felles-cfn-extensions-prod-crossaccount-r53-role
            DomainHostedZoneId=Z073533223SF44MXB039V
          stackParametersFargate: >-
            Env=test
            DomainName=brevgenerator-valid.arbeidstilsynet.no
            CrossAccountRoute53RoleArn=arn:aws:iam::250640723606:role/felles-cfn-extensions-prod-crossaccount-r53-role
            DomainHostedZoneId=Z073533223SF44MXB039V
            PdfApiUrl=https://brevgenerator2-api-valid.arbeidstilsynet.no
            AzureDevopsPat=$(AZURE_DEVOPS_PAT)
          tags: >-
            Environment=test
            RepoName=$(Build.Repository.Name)
            Version=$(Build.SourceBranchName)-$(Build.SourceVersion)
            CostCenter=3103
            ApplicationName=brevgenerator2

  - stage: Brevgen2PreProdTesting
    displayName: Pre-Production Testing
    jobs:
      - job: Testcontainer
        displayName: Integration tests (Testcontainer)
        steps:
          - template: pnpm/setup-pnpm.yaml@Templates

          - script: "pnpm test:integration"
            displayName: "Test"
            workingDirectory: "apps/api"

          - task: PublishTestResults@2
            inputs:
              testResultsFiles: "**/junit.xml"
              mergeTestResults: true
              failTaskOnMissingResultsFile: true
            condition: succeededOrFailed()

          - task: PublishPipelineArtifact@1
            displayName: "Publish snapshots"
            inputs:
              targetPath: "apps/api/integration-tests/__snapshots__"
              artifact: "integration-tests-snapshots-$(System.StageName)-$(System.JobAttempt)"
              publishLocation: pipeline
            condition: failed()

      - job: LoadTest
        displayName: Run Load Tests
        steps:
          - template: pnpm/setup-pnpm.yaml@Templates

          - task: AWSShellScript@1
            displayName: "Fetch API Gateway API Key"
            inputs:
              awsCredentials: "TestDeploy"
              regionName: "eu-west-1"
              scriptType: "inline"
              inlineScript: |
                ssmParameterApiKeyId="/brevgenerator2/test/api_key_id"
                apiKeyId=$(aws ssm get-parameter --name "$ssmParameterApiKeyId" --query "Parameter.Value" --output text)
                apiKey=$(aws apigateway get-api-key --api-key "$apiKeyId" --include-value --query "value" --output text)
                echo "##vso[task.setvariable variable=apiKey;issecret=true]$apiKey"

          - script: "pnpm test:load"
            displayName: "Run Load Tests"
            workingDirectory: "apps/api"
            env:
              API_URL: "https://brevgenerator2-api-valid.arbeidstilsynet.no/genererbrev"
              API_KEY: $(apiKey)
              PARALLEL_REQUESTS: 50
              BATCH_COUNT: 10
              BATCH_DELAY_MS: 1000
              OUTPUT_FILE: "./load-test-results/results.json"

          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: "apps/api/load-test-results"
            condition: always()

  - stage: Brevgen2DeployProd
    displayName: Prod
    jobs:
      - template: templates/brevgen2-deploy.yml
        parameters:
          env: prod
          awsCredentialsApi: ProdDeployCD
          awsCredentialsWeb: ProdPubDeployCD
          region: eu-west-1
          infraBucketApi: "infra-prod-deploy-bucket"
          infraBucketWeb: "infra-prod-deploy-pub-bucket"
          chromiumLayerBucket: prod-brevgenerator2-lambda-layers
          chromiumVersion: "133.0.0"
          imageName: prod-brevgenerator2-web
          stackParametersApi: >-
            Env=prod
            DomainName=brevgenerator2-api.arbeidstilsynet.no
            CrossAccountRoute53RoleArn=arn:aws:iam::250640723606:role/felles-cfn-extensions-prod-crossaccount-r53-role
            DomainHostedZoneId=Z073533223SF44MXB039V
          stackParametersFargate: >-
            Env=prod
            DomainName=brevgenerator.arbeidstilsynet.no
            CrossAccountRoute53RoleArn=arn:aws:iam::250640723606:role/felles-cfn-extensions-prod-crossaccount-r53-role
            DomainHostedZoneId=Z073533223SF44MXB039V
            PdfApiUrl=https://brevgenerator2-api.arbeidstilsynet.no
            AzureDevopsPat=$(AZURE_DEVOPS_PAT)
          tags: >-
            Environment=prod
            RepoName=$(Build.Repository.Name)
            Version=$(Build.SourceBranchName)-$(Build.SourceVersion)
            CostCenter=3103
            ApplicationName=brevgenerator2
