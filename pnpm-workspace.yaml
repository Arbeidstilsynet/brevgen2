packages:
  - apps/*
  - packages/*
  - nuget-client/*

autoInstallPeers: false

auditConfig:
  ignoreGhsas:
    # used by pdf-visual-diff, need patch in intermediate transient dependency jimp https://github.com/jimp-dev/jimp/issues/1399
    - GHSA-5v7r-6r5c-r473

injectWorkspacePackages: true

minimumReleaseAge: 4320

onlyBuiltDependencies:
  - puppeteer

overrides:
  "@tootallnate/once@<3.0.1": ">=3.0.1"
  minimatch@<3.1.4: 3.1.4
  minimatch@>=5.0.0 <5.1.8: 5.1.8
  minimatch@>=8.0.0 <10.2.4: ">=10.2.4"
  dompurify@<3.3.2: 3.3.2

trustPolicy: no-downgrade

trustPolicyExclude:
  - chokidar@4.0.3
  - jose@4.15.9
  - semver@6.3.1
