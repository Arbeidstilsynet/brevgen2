packages:
  - apps/*
  - packages/*
  - nuget-client

auditConfig:
  ignoreGhsas:
    # used by pdf-visual-diff, need patch in intermediate transient dependency jimp https://github.com/jimp-dev/jimp/issues/1399
    - GHSA-5v7r-6r5c-r473

autoInstallPeers: false

ignoredBuiltDependencies:
  - cpu-features
  - esbuild
  - protobufjs
  - sharp
  - ssh2

injectWorkspacePackages: true

minimumReleaseAge: 4320

minimumReleaseAgeExclude:
  - oxlint
  - "@oxlint/*"
  - oxfmt
  - "@oxfmt/*"
  - minimatch
  - "@next/*"
  - fastify@5.8.4
  - picomatch
  - brace-expansion@5.0.5

onlyBuiltDependencies:
  - puppeteer

overrides:
  "@tootallnate/once@<3.0.1": ">=3.0.1"
  brace-expansion@>=5.0.0 <5.0.5: ">=5.0.5"
  dompurify@<3.3.2: 3.3.2
  fast-xml-parser@>=4.0.0-beta.3 <=5.5.6: ">=5.5.7"
  fastify@<=5.8.2: ">=5.8.3"
  minimatch@>=5.0.0 <5.1.8: 5.1.8
  minimatch@>=8.0.0 <10.2.4: ">=10.2.4"
  picomatch@<2.3.2: ">=2.3.2 <3.0.0"
  picomatch@>=4.0.0 <4.0.4: ">=4.0.4"
  # bump readdir-glob from v1 to v3 for brace-expansion vulns.
  # testcontainers -> archivers (unmaintained?) -> readdir-glob v1 -> minimatch v5 -> brace-expansion v2
  # https://github.com/archiverjs/node-archiver/issues/818#issuecomment-3944071249
  # readdir-glob v2 and v3 appear to have no real breaking changes besides Node v10 compat.
  "readdir-glob@<3.0.0": ">=3.0.0 <4.0.0"

trustPolicy: no-downgrade

trustPolicyExclude:
  - jose@4.15.9
  - semver@6.3.1
