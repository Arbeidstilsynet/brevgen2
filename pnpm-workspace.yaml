packages:
  - apps/*
  - packages/*
  - nuget-client

autoInstallPeers: false

ignoredBuiltDependencies:
  - cpu-features
  - esbuild
  - protobufjs
  - sharp
  - ssh2

injectWorkspacePackages: true

minimumReleaseAge: 4320

minimumReleaseAgeExclude:
  - oxlint
  - "@oxlint/*"
  - oxfmt
  - "@oxfmt/*"
  - "@next/*"
  # Renovate security update: fastify@5.8.5
  - fastify@5.8.5

onlyBuiltDependencies:
  - puppeteer

overrides:
  "@tootallnate/once@<3.0.1": ">=3.0.1"
  basic-ftp@<=5.2.1: ">=5.2.2"
  dompurify@<3.3.2: 3.3.3
  fast-jwt@<6.2.1: ">=6.2.1"
  jimp@<1.6.1: ">=1.6.1"

trustPolicy: no-downgrade

trustPolicyExclude:
  - jose@4.15.9
  - semver@6.3.1
