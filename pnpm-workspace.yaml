packages:
  - apps/*
  - packages/*
  - nuget-client

autoInstallPeers: false

ignoredBuiltDependencies:
  - cpu-features
  - esbuild
  - protobufjs
  - sharp
  - ssh2

injectWorkspacePackages: true

minimumReleaseAge: 4320

minimumReleaseAgeExclude:
  - oxlint
  - "@oxlint/*"
  - oxfmt
  - "@oxfmt/*"
  - "@next/*"

onlyBuiltDependencies:
  - puppeteer

overrides:
  "@tootallnate/once@<3.0.1": ">=3.0.1"
  basic-ftp@<=5.2.1: ">=5.2.2"
  dompurify@<3.3.2: 3.3.2
  fast-jwt@<6.2.1: ">=6.2.1"
  jimp@<1.6.1: ">=1.6.1"
  # bump readdir-glob from v1 to v3 for brace-expansion vulns.
  # testcontainers -> archivers (unmaintained?) -> readdir-glob v1 -> minimatch v5 -> brace-expansion v2
  # https://github.com/archiverjs/node-archiver/issues/818#issuecomment-3944071249
  # readdir-glob v2 and v3 appear to have no real breaking changes besides Node v10 compat.
  "readdir-glob@<3.0.0": ">=3.0.0 <4.0.0"
  vite@>=8.0.0 <=8.0.4: "8.0.5"

trustPolicy: no-downgrade

trustPolicyExclude:
  - jose@4.15.9
  - semver@6.3.1
