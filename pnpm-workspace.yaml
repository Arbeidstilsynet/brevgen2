packages:
  - apps/*
  - packages/*
  - nuget-client

allowBuilds:
  cpu-features: false
  protobufjs: false
  puppeteer: true
  sharp: false
  ssh2: false

autoInstallPeers: false

injectWorkspacePackages: true

minimumReleaseAge: 4320

minimumReleaseAgeExclude:
  - oxlint
  - "@oxlint/*"
  - oxfmt
  - "@oxfmt/*"
  - "@next/*"
  - fastify@5.8.5
  - dompurify@3.3.4
  - sanitize-html@2.17.3
  - basic-ftp@5.2.3
  - protobufjs@7.5.5
  - "@fastify/static@9.1.1"

overrides:
  "@tootallnate/once@<3.0.1": ">=3.0.1"
  basic-ftp@<=5.2.2: ">=5.3.0"
  dompurify@<=3.3.3: ">=3.4.0"
  fast-jwt@<6.2.1: ">=6.2.1"
  jimp@<1.6.1: ">=1.6.1"

trustPolicy: no-downgrade

trustPolicyExclude:
  - jose@4.15.9
  - semver@6.3.1
