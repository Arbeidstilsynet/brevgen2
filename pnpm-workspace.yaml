packages:
  - apps/*
  - packages/*
  - nuget-client/*

auditConfig:
  ignoreGhsas:
    # used by pdf-visual-diff, need patch in intermediate transient dependency jimp https://github.com/jimp-dev/jimp/issues/1399
    - GHSA-5v7r-6r5c-r473

autoInstallPeers: false

ignoredBuiltDependencies:
  - cpu-features
  - esbuild
  - protobufjs
  - sharp
  - ssh2

injectWorkspacePackages: true

minimumReleaseAge: 4320

minimumReleaseAgeExclude:
  - oxlint
  - "@oxlint/*"
  - oxfmt
  - "@oxfmt/*"
  - minimatch
  - "@next/*"
  - tsdown@0.21.3
  - tinyexec@1.0.4
  - fast-xml-parser@5.5.7
  - fast-xml-builder@1.1.4
  # Renovate security update: next@16.1.7
  - next@16.1.7

onlyBuiltDependencies:
  - puppeteer

overrides:
  "@tootallnate/once@<3.0.1": ">=3.0.1"
  dompurify@<3.3.2: 3.3.2
  fast-xml-parser@>=4.0.0-beta.3 <=5.5.6: ">=5.5.7"
  minimatch@<3.1.4: 3.1.4
  minimatch@>=5.0.0 <5.1.8: 5.1.8
  minimatch@>=8.0.0 <10.2.4: ">=10.2.4"
  undici@>=7.0.0 <7.24.0: ">=7.24.0"
  undici@>=7.17.0 <7.24.0: ">=7.24.0"
  yauzl@<3.2.1: ">=3.2.1"

trustPolicy: no-downgrade

trustPolicyExclude:
  - chokidar@4.0.3
  - jose@4.15.9
  - semver@6.3.1
