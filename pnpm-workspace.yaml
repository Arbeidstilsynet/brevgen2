packages:
  - apps/*
  - packages/*
  - nuget-client/*

auditConfig:
  ignoreGhsas:
    - GHSA-2g4f-4pwh-qvx6

autoInstallPeers: false

injectWorkspacePackages: true

minimumReleaseAge: 4320

onlyBuiltDependencies:
  - puppeteer

overrides:
  "@isaacs/brace-expansion@<=5.0.0": ">=5.0.1"

trustPolicy: no-downgrade

trustPolicyExclude:
  - chokidar@4.0.3
  - jose@4.15.9
  - semver@6.3.1
