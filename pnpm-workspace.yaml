packages:
  - apps/*
  - packages/*
  - nuget-client/*

autoInstallPeers: false

injectWorkspacePackages: true

minimumReleaseAge: 4320

minimumReleaseAgeExclude:
  - react@19.2.1
  - react-dom@19.2.1
  - next@16.0.7
  - eslint-config-next@16.0.7
  - '@next/eslint-plugin-next@16.0.7'
  - '@next/env@16.0.7'
  - jws@4.0.1
  - jsonwebtoken@9.0.3

onlyBuiltDependencies:
  - puppeteer

overrides:
  glob@>=10.3.7 <=11.0.3: '>=11.1.0'
  jws@=4.0.0: '>=4.0.1'
  undici@>=7.0.0 <7.18.2: '>=7.18.2'

trustPolicy: no-downgrade

trustPolicyExclude:
  - chokidar@4.0.3
  - jose@4.15.9
  - semver@6.3.1
