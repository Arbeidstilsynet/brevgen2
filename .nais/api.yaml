apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: brevgen2-api
  namespace: plattform
spec:
  env:
    - name: PORT
      value: "4000"
  ingresses:
    - https://brevgen2-api.intern.dev.arbeidstilsynet.no
  accessPolicy:
    inbound:
      rules:
        - application: brevgen2-web
          namespace: plattform
  image: "{{image}}"
  port: 4000
  replicas:
    max: 5
    min: 2
  resources:
    limits:
      cpu: 2000m
      memory: 2048Mi
    requests:
      cpu: 1000m
      memory: 1024Mi
  readiness:
    failureThreshold: 10
    initialDelay: 20
    path: /health
    periodSeconds: 5
    port: 4000
    timeout: 1
