apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: "{{api.name}}"
  namespace: "{{team}}"
  labels:
    team: "{{team}}"
spec:
  env:
    - name: PORT
      value: "4000"
    - name: AZURE_TENANT_ID
      value: "{{azure_tenant_id}}"
    - name: AZURE_APPLICATION_ID
      value: "{{azure_app_id}}"
  ingresses:
    - "{{api.ingress}}"
  accessPolicy:
    inbound:
      rules:
        - application: "{{web.name}}"
          namespace: "{{team}}"
  image: "{{image}}"
  port: 4000
  replicas:
    max: 2
    min: 2
  resources:
    limits:
      cpu: 2000m
      memory: 2048Mi
    requests:
      cpu: 1000m
      memory: 1024Mi
  readiness:
    failureThreshold: 10
    initialDelay: 20
    path: /health
    periodSeconds: 5
    port: 4000
    timeout: 1
