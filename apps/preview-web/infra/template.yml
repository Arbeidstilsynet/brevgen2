AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Infrastructure stack for ECS Fargate with ALB and Domain

Parameters:
  Env:
    Type: String
    Description: Environment name, e.g. dev/prod/myname

  ImageURI:
    Type: String
    Description: URI to image in private ECR repository

  DomainName:
    Type: String

  CrossAccountRoute53RoleArn:
    Type: String
    Description: >
      Rolle som gir tillatelse til å bruke AT::CertificateManager::Certificate
      og AT::Route53::RecordSet til å opprette Route53 records i en annen konto

  DomainHostedZoneId:
    Type: String
    Description: Hosted zone ID for Route 53 hvor domenet er registrert

  TaskDefinitionCpu:
    Type: String
    Default: 512

  TaskDefinitionMemory:
    Type: String
    Default: 1024

  PdfApiUrl:
    Type: String

  PdfApiKey:
    Type: String
    NoEcho: true

  AzureDevopsPat:
    Type: String
    NoEcho: true

  ArbeidstilsynetPublicIP:
    Type: String
    Default: "77.88.94.130"

  WAFWebACLArn:
    Type: AWS::SSM::Parameter::Value<String>
    Default: "/waf/regional/arbeidstilsynet-public-ip/arn"

  VpcId:
    Type: AWS::SSM::Parameter::Value<String>
    Default: "/vpc/shared-public-vpc/id"

  VpcPublicSubnet1Id:
    Type: AWS::SSM::Parameter::Value<String>
    Default: "/vpc/shared-public-vpc/subnet/public/a/id"

  VpcPublicSubnet2Id:
    Type: AWS::SSM::Parameter::Value<String>
    Default: "/vpc/shared-public-vpc/subnet/public/b/id"

Mappings:
  # Mapping for å forhåpentligvis fange opp feil hvis vi skal deploye til en annen region enn Irland.
  # https://docs.aws.amazon.com/elasticloadbalancing/latest/application/enable-access-logging.html
  ELBAccountMap:
    eu-west-1:
      Account: "156460612806"

Resources:
  # **************************************
  # DNS
  # **************************************
  Certificate:
    Type: AT::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      DnsValidation: true
      RoleArn: !Ref CrossAccountRoute53RoleArn
      HostedZoneId: !Ref DomainHostedZoneId

  CustomDomainNameRecord:
    Type: AT::Route53::RecordSet
    Properties:
      RoleArn: !Ref CrossAccountRoute53RoleArn
      HostedZoneId: !Ref DomainHostedZoneId
      Record:
        Name: !Ref DomainName
        RType: A
        Alias: true
        AliasTarget:
          HostedZoneId: !GetAtt PublicLoadBalancer.CanonicalHostedZoneID
          DNSName: !GetAtt PublicLoadBalancer.DNSName

  # **************************************
  # Fargate
  # **************************************
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${AWS::StackName}-cluster"
      CapacityProviders:
        - FARGATE

  FargateService:
    Type: AWS::ECS::Service
    DependsOn:
      - PublicLBListener
      - PublicHTTPListener
    Properties:
      Cluster: !Ref ECSCluster
      LaunchType: FARGATE
      DesiredCount: 1
      EnableExecuteCommand: true
      HealthCheckGracePeriodSeconds: 5
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref ECSTaskSecurityGroup
          Subnets:
            - !Ref VpcPublicSubnet1Id
            - !Ref VpcPublicSubnet2Id
      DeploymentConfiguration:
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
        MaximumPercent: 200
        MinimumHealthyPercent: 50
      TaskDefinition: !Ref FargateTaskDefinition
      LoadBalancers:
        - ContainerName: web
          ContainerPort: 3000
          TargetGroupArn: !Ref PublicLBTargetGroup

  FargateTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${AWS::StackName}-task"
      Cpu: !Ref TaskDefinitionCpu
      Memory: !Ref TaskDefinitionMemory
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt FargateTaskExecutionRole.Arn
      TaskRoleArn: !Ref ECSTaskRole
      RuntimePlatform:
        CpuArchitecture: X86_64
      ContainerDefinitions:
        - Name: web
          Image: !Ref ImageURI
          Essential: true
          ReadonlyRootFilesystem: true
          PortMappings:
            - ContainerPort: 3000
          Environment:
            - Name: PDF_API_URL
              Value: !Ref PdfApiUrl
            - Name: PDF_API_KEY
              Value: !Ref PdfApiKey
            - Name: AZURE_DEVOPS_PAT
              Value: !Ref AzureDevopsPat
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: AWS_BUCKET_NAME
              Value: !Ref WorkspaceBucket
          # Diverse forsøk på task healthcheck har ikke lykkes,
          # selv om ALb healthcheck mot samme endepunkt fungerer.
          # curl: (7) Failed to connect to localhost port 3000
          # HealthCheck:
          #   Command:
          #     - CMD-SHELL
          #     - "curl --fail http://localhost:3000/api/health >> /proc/1/fd/1 2>&1  || exit 1"
          #   StartPeriod: 5
          LogConfiguration:
            LogDriver: awslogs
            Options:
              mode: non-blocking
              max-buffer-size: 25m
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: containerlog

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${AWS::StackName}
      RetentionInDays: 7

  FargateTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: "sts:AssumeRole"
            Condition:
              ArnLike:
                aws:SourceArn: !Sub arn:aws:ecs:${AWS::Region}:${AWS::AccountId}:*
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Path: /
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: "sts:AssumeRole"
            Condition:
              ArnLike:
                aws:SourceArn: !Sub arn:aws:ecs:${AWS::Region}:${AWS::AccountId}:*
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Path: /

  # **************************************
  # S3 Bucket
  # **************************************
  WorkspaceBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${Env}-at-brevgenerator2-workspace"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  WorkspaceBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WorkspaceBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt ECSTaskRole.Arn
            Action:
              - s3:ListBucket
            Resource: !Sub "arn:aws:s3:::${WorkspaceBucket}"
          - Effect: Allow
            Principal:
              AWS: !GetAtt ECSTaskRole.Arn
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
            Resource: !Sub "arn:aws:s3:::${WorkspaceBucket}/*"

  # **************************************
  # Load Balancer
  # **************************************
  PublicLoadBalancer:
    DependsOn:
      - ALBAccessLogsBucketPolicy
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Scheme: internet-facing
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Subnets:
        - !Ref VpcPublicSubnet1Id
        - !Ref VpcPublicSubnet2Id
      Type: application
      LoadBalancerAttributes:
        - Key: access_logs.s3.enabled
          Value: "true"
        - Key: access_logs.s3.bucket
          Value: !Ref ALBAccessLogsBucket

  PublicLBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      HealthCheckIntervalSeconds: 10
      HealthyThresholdCount: 2
      HealthCheckTimeoutSeconds: 5
      HealthCheckPath: /api/health
      VpcId: !Ref VpcId
      Protocol: HTTP
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: 0
      Port: 3000
      TargetType: ip
      IpAddressType: ipv4

  PublicLBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref PublicLBTargetGroup
      LoadBalancerArn: !Ref PublicLoadBalancer
      Port: 443
      Protocol: HTTPS
      SslPolicy: "ELBSecurityPolicy-TLS13-1-3-2021-06"
      Certificates:
        - CertificateArn: !Ref Certificate

  PublicHTTPListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: "443"
            StatusCode: HTTP_301
      LoadBalancerArn: !Ref PublicLoadBalancer
      Port: 80
      Protocol: HTTP

  # **************************************
  # Load Balancer WAF
  # **************************************
  ALBWebACLAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Properties:
      ResourceArn: !GetAtt PublicLoadBalancer.LoadBalancerArn
      WebACLArn: !Ref WAFWebACLArn

  # **************************************
  # Access Logs
  # **************************************
  ALBAccessLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  ALBAccessLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ALBAccessLogsBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "AWSALBLogsPolicy"
            Effect: Allow
            Principal:
              AWS: !Sub
                - "arn:${AWS::Partition}:iam::${ELBAccount}:root"
                - {
                    ELBAccount:
                      !FindInMap [ELBAccountMap, !Ref "AWS::Region", Account],
                  }
            Action: "s3:PutObject"
            Resource: !Sub "${ALBAccessLogsBucket.Arn}/*"

  # **************************************
  # Security Groups
  # **************************************
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB security group allowing inbound traffic from internal network IP
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - CidrIp: !Sub "${ArbeidstilsynetPublicIP}/32"
          Description: Allow HTTPS traffic from the internal network on port 443
          FromPort: 443
          IpProtocol: tcp
          ToPort: 443
        - CidrIp: !Sub "${ArbeidstilsynetPublicIP}/32"
          Description: Allow HTTP traffic from the internal network on port 80
          FromPort: 80
          IpProtocol: tcp
          ToPort: 80
      SecurityGroupEgress:
        - CidrIp: "0.0.0.0/0"
          Description: Allow all outbound traffic
          IpProtocol: "-1"

  ECSTaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS tasks security group allowing inbound traffic from ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: Allow traffic from ALB on port 3000
          FromPort: 3000
          IpProtocol: tcp
          ToPort: 3000
      SecurityGroupEgress:
        - CidrIp: "0.0.0.0/0"
          Description: Allow all outbound traffic
          IpProtocol: "-1"

  # **************************************
  # Outputs
  # **************************************
Outputs:
  LoadBalancerURL:
    Value: !GetAtt PublicLoadBalancer.DNSName
  S3WorkspaceBucket:
    Value: !Ref WorkspaceBucket
