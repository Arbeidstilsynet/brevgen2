services:
  api:
    environment:
      - DANGEROUS_DISABLE_AUTH=true

  web:
    environment:
      - PDF_AUTH_MODE=none
      - AUTH_SECRET=foobar
      - NEXTAUTH_URL=http://localhost:3000/api/auth
      - GCP_BUCKET_NAME=test-bucket
      - GCS_MOCK_API_ENDPOINT=http://gcs_mock:9023
    depends_on:
      gcs_mock:
        condition: service_started

  gcs_mock:
    image: oittaa/gcp-storage-emulator:latest@sha256:a93c3fc7ec65bb5980b3d684103fbfc5aff093e7e04b2e001365e30835e07c20
    environment:
      - PORT=9023
    ports:
      - "9023:9023"
    volumes:
      - gcs_data:/storage
    command: ["start", "--default-bucket", "test-bucket"]

volumes:
  gcs_data:
