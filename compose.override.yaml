services:
  web:
    environment:
      - AWS_ACCESS_KEY_ID=foo
      - AWS_SECRET_ACCESS_KEY=bar
      - AWS_BUCKET_NAME=test-bucket
      - AWS_REGION=eu-west-1
      - AWS_ENDPOINT_URL_S3=http://s3mock:9090
      - AWS_S3_FORCE_PATH_STYLE=true

  s3mock:
    image: adobe/s3mock:latest@sha256:5bc6d389b02df059bea659b157653c99f88fb303f880a9b47defdab011018845
    ports:
      - "9090:9090"
      - "9191:9191"
    environment:
      - initialBuckets=test-bucket
      - root=/data
    volumes:
      - s3data:/data

volumes:
  s3data:
