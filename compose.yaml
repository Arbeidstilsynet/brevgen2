services:
  api:
    image: brevgenerator2-api:test
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        CHROMIUM_VERSION: "131.*"
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  web:
    image: brevgenerator2-web:test
    build:
      context: .
      dockerfile: apps/preview-web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PDF_API_URL=http://api:4000
      - PDF_API_KEY=foobar
    env_file:
      - path: apps/preview-web/.env
        required: false
    depends_on:
      api:
        condition: service_healthy
