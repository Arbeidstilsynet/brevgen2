name: Update AWS Secrets

on:
  workflow_dispatch:

env:
  AWS_SECRET_NAME: /brevgen2/client-credentials

jobs:
  update-secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        environment: [aws-atdev01, aws-attest01, aws-atprod01]
    environment: ${{ matrix.environment }}
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5.1.0
        with:
          aws-region: ${{ vars.AWS_PRIMARY_REGION}}
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}

      - name: Update Secret
        env:
          SECRET_NAME: ${{ env.AWS_SECRET_NAME }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          CLIENT_ID: ${{ vars.CLIENT_ID }}
          TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
        run: |
          SECRET_VALUE=$(jq -n \
            --arg cs "$CLIENT_SECRET" \
            --arg ci "$CLIENT_ID" \
            --arg ti "$TENANT_ID" \
            '{client_secret: $cs, client_id: $ci, tenant_id: $ti}')
          # Try to update, if it fails, create
          aws secretsmanager update-secret \
            --secret-id "$SECRET_NAME" \
            --secret-string "$SECRET_VALUE" \
            2>/dev/null || \
          aws secretsmanager create-secret \
            --name "$SECRET_NAME" \
            --secret-string "$SECRET_VALUE" \
            --description "OAuth2 client credentials for Brevgenerator"
          echo "✅ Secret updated in ${{ matrix.environment }}"
