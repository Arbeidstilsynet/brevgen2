name: Build and deploy
on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  deploy_api:
    name: Deploy API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: nais/docker-build-push@791ebb6f74b82849c742a9bc9c97abe44c6c111f # v0
        id: docker-build-push-api
        with:
          team: plattform
          image_suffix: api
          # web app must be built from root for pnpm lockfile and packages to be available
          docker_context: "."
          dockerfile: "./apps/api/Dockerfile"
          build_args: |
            CHROMIUM_VERSION: "139.*"
      - uses: nais/deploy/actions/deploy@961addd1e4d4211f1a7333ada5fde85f7c9aa5b7 # v2
        env:
          CLUSTER: dev
          RESOURCE: .nais/api.yaml
          VAR: image=${{ steps.docker-build-push-api.outputs.image }}
          TELEMETRY: ${{ steps.docker-build-push-api.outputs.telemetry }}

  deploy_web:
    name: Deploy web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: nais/docker-build-push@791ebb6f74b82849c742a9bc9c97abe44c6c111f # v0
        id: docker-build-push-web
        with:
          team: plattform
          image_suffix: web
          # web app must be built from root for pnpm lockfile and packages to be available
          docker_context: "."
          dockerfile: "./apps/preview-web/Dockerfile"
      - uses: nais/deploy/actions/deploy@961addd1e4d4211f1a7333ada5fde85f7c9aa5b7 # v2
        env:
          CLUSTER: dev
          RESOURCE: .nais/web.yaml
          VAR: image=${{ steps.docker-build-push-web.outputs.image }},s3bucket=dev-at-brevgenerator2-workspace
          TELEMETRY: ${{ steps.docker-build-push-web.outputs.telemetry }}
