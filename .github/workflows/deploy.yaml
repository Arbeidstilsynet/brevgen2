name: Deploy to Nais
on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

  #          +-------------------+
  #          |   check_changes   |
  #          +---------+---------+
  #                    |
  #        +-----------+-----------+
  #        |                       |
  #  +-----------+           +-----------+
  #  | build_api |           | build_web |
  #  +-----+-----+           +-----+-----+
  #        |                       |
  #  +-----------+           +-----------+
  #  |deploy_api |           |deploy_web |
  #  |   _dev    |           |   _dev    |
  #  +-----+-----+           +-----+-----+
  #        |                       |
  #  +-----------+           +-----------+
  #  |load_test  |           |           |
  #  |  _api     |           |           |
  #  +-----+-----+           +-----+-----+
  #        |                       |
  #  +-----------+           +-----------+
  #  |deploy_api |           |deploy_web |
  #  |   _prod   |           |   _prod   |
  #  +-----------+           +-----------+

jobs:
  check_changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      api: ${{ steps.api.outputs.changes_detected }}
      web: ${{ steps.web.outputs.changes_detected }}
      naisapi: ${{ steps.naisapi.outputs.changes_detected }}
      naisweb: ${{ steps.naisweb.outputs.changes_detected }}
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: API changed?
        uses: Arbeidstilsynet/action-check-changes@6e51077b178b819e4194f40e32bd562df0954f3f # v1
        id: api
        with:
          include: |
            apps/api/
            packages/
            pnpm-lock.yaml
            .github/workflows/deploy.yaml
          exclude: |
            **/README.md

      - name: Nais (api) changed?
        uses: Arbeidstilsynet/action-check-changes@6e51077b178b819e4194f40e32bd562df0954f3f # v1
        id: naisapi
        with:
          include: |
            .nais/api.yaml
            .nais/vars-*.yaml
            .github/workflows/deploy.yaml

      - name: Web changed?
        uses: Arbeidstilsynet/action-check-changes@6e51077b178b819e4194f40e32bd562df0954f3f # v1
        id: web
        with:
          include: |
            apps/preview-web/
            packages/
            pnpm-lock.yaml
            .github/workflows/deploy.yaml
          exclude: |
            **/README.md

      - name: Nais (web) changed?
        uses: Arbeidstilsynet/action-check-changes@6e51077b178b819e4194f40e32bd562df0954f3f # v1
        id: naisweb
        with:
          include: |
            .nais/web.yaml
            .nais/vars-*.yaml
            .github/workflows/deploy.yaml

  build_api:
    needs: check_changes
    if: needs.check_changes.result == 'success' && needs.check_changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      image: ${{ steps.docker.outputs.image }}
      telemetry: ${{ steps.docker.outputs.telemetry }}
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: nais/docker-build-push@ae613eff6f44f0323476eda1c3994a7c518761c3 # v0
        id: docker
        with:
          team: plattform
          image_suffix: api
          docker_context: "."
          dockerfile: "./apps/api/Dockerfile"
      - name: Push image to ghcr.io
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          TARGET_REPO="ghcr.io/${GITHUB_REPOSITORY,,}-api" # Lowercase owner/repo for GHCR
          SHORT_SHA="${GITHUB_SHA::7}"
          docker buildx imagetools create \
            -t "${TARGET_REPO}:latest" \
            -t "${TARGET_REPO}:${SHORT_SHA}" \
            "${{ steps.docker.outputs.image }}"

  build_web:
    needs: check_changes
    if: needs.check_changes.result == 'success' && needs.check_changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      image: ${{ steps.docker.outputs.image }}
      telemetry: ${{ steps.docker.outputs.telemetry }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: nais/docker-build-push@ae613eff6f44f0323476eda1c3994a7c518761c3 # v0
        id: docker
        with:
          team: plattform
          image_suffix: web
          docker_context: "."
          dockerfile: "./apps/preview-web/Dockerfile"

  deploy_api_dev:
    needs: [check_changes, build_api]
    # deploy using new image if built, or reuse previous deployed image if only nais config changed
    # https://docs.atil.cloud.nais.io/workloads/explanations/workload-image/?h=workload_image#using-the-workload_image-environment-variable
    if: |
      always() &&
      (needs.build_api.result == 'success' ||
        (needs.build_api.result == 'skipped' && needs.check_changes.outputs.naisapi == 'true')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: nais/deploy/actions/deploy@fa754451577294aae42872a69b888b3470478ec1 # v2
        env:
          CLUSTER: dev
          RESOURCE: .nais/api.yaml
          WORKLOAD_IMAGE: ${{ needs.build_api.outputs.image }}
          VAR: git_sha=${{ github.sha }}
          VARS: .nais/vars-dev.yaml
          TELEMETRY: ${{ needs.build_api.outputs.telemetry }}

  deploy_web_dev:
    needs: [check_changes, build_web]
    # deploy using new image if built, or reuse previous deployed image if only nais config changed
    # https://docs.atil.cloud.nais.io/workloads/explanations/workload-image/?h=workload_image#using-the-workload_image-environment-variable
    if: |
      always() &&
      (needs.build_web.result == 'success' ||
        (needs.build_web.result == 'skipped' && needs.check_changes.outputs.naisweb == 'true')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: nais/deploy/actions/deploy@fa754451577294aae42872a69b888b3470478ec1 # v2
        env:
          CLUSTER: dev
          RESOURCE: .nais/web.yaml
          WORKLOAD_IMAGE: ${{ needs.build_web.outputs.image }}
          VARS: .nais/vars-dev.yaml
          TELEMETRY: ${{ needs.build_web.outputs.telemetry }}

  load_test_api:
    name: Load test API (dev)
    needs: deploy_api_dev
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: dev
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Extract NAIS dev variables
        id: nais
        shell: bash
        run: |
          set -euo pipefail
          FILE=.nais/vars-dev.yaml
          TENANT_ID=$(yq -r '.azure_tenant_id' "$FILE")
          APP_ID=$(yq -r '.azure_app_id' "$FILE")
          API_INGRESS=$(yq -r '.api.ingress' "$FILE")
          if [[ -z "$TENANT_ID" || -z "$APP_ID" || -z "$API_INGRESS" || "$TENANT_ID" == null || "$APP_ID" == null || "$API_INGRESS" == null ]]; then
            echo "Failed to parse required values from $FILE" >&2
            exit 1
          fi
          echo "tenant_id=$TENANT_ID" >> $GITHUB_OUTPUT
          echo "api_app_id=$APP_ID" >> $GITHUB_OUTPUT
          echo "api_base=$API_INGRESS" >> $GITHUB_OUTPUT
          echo "api_url=$API_INGRESS/genererbrev" >> $GITHUB_OUTPUT
          echo "Parsed tenant=$TENANT_ID app=$APP_ID ingress=$API_INGRESS"

      - name: Acquire Azure AD token (client credentials)
        id: token
        env:
          CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        shell: bash
        run: |
          set -u
          CLIENT_ID='${{ steps.nais.outputs.api_app_id }}'
          TENANT_ID='${{ steps.nais.outputs.tenant_id }}'
          RESPONSE=$(curl -sS https://login.microsoftonline.com/${TENANT_ID}/oauth2/v2.0/token \
            -H 'Content-Type: application/x-www-form-urlencoded' \
            --data-urlencode client_id=${CLIENT_ID} \
            --data-urlencode client_secret=${CLIENT_SECRET} \
            --data-urlencode scope=api://${CLIENT_ID}/.default \
            --data-urlencode grant_type=client_credentials)
          JWT=$(jq -r '.access_token' <<<"$RESPONSE")
          [ -z "$JWT" -o "$JWT" = null ] && { echo "Token fetch failed"; echo "$RESPONSE"; exit 1; }
          echo "jwt=$JWT" >> $GITHUB_OUTPUT

      - uses: Arbeidstilsynet/action-pnpm-setup@f3d97993013e8b1a22061064fbc5786b3a84bfd6 # v1

      - name: Run load tests (JWT auth)
        id: run_load_tests
        shell: bash
        env:
          API_URL: ${{ steps.nais.outputs.api_url }}
          JWT: ${{ steps.token.outputs.jwt }}
          PARALLEL_REQUESTS: 300
          BATCH_COUNT: 10
          BATCH_DELAY_MS: 500
          TIMEOUT_MS: 60000
          OUTPUT_FILE: results/gha-results.json
        run: pnpm --filter api run test:load

      - name: Analyze
        if: ${{ always() && steps.run_load_tests.outcome != 'skipped' && steps.run_load_tests.outcome != '' }}
        run: pnpm --filter api run test:load:analyze results/gha-results.json

      - name: Upload load test results
        if: ${{ always() && steps.run_load_tests.outcome != 'skipped' && steps.run_load_tests.outcome != '' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: load-test-results
          path: apps/api/results/gha-results.json
          if-no-files-found: warn

      - name: Summarize result
        if: ${{ always() && steps.run_load_tests.outcome != 'skipped' && steps.run_load_tests.outcome != '' }}
        working-directory: ./apps/api
        shell: bash
        run: |
          if [[ -f results/gha-results.json ]]; then
            echo "Load test results:" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            jq '.result | {totalRequests, successfulRequests, failedRequests, totalTimeMs, averageRequestTimeMs}' results/gha-results.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No results file found" >> $GITHUB_STEP_SUMMARY
          fi

  deploy_api_prod:
    needs: [build_api, load_test_api, deploy_api_dev]
    if: |
      always() &&
      needs.load_test_api.result == 'success' &&
      needs.deploy_api_dev.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: nais/deploy/actions/deploy@fa754451577294aae42872a69b888b3470478ec1 # v2
        env:
          CLUSTER: prod
          RESOURCE: .nais/api.yaml
          WORKLOAD_IMAGE: ${{ needs.build_api.outputs.image }}
          VAR: git_sha=${{ github.sha }}
          VARS: .nais/vars-prod.yaml
          TELEMETRY: ${{ needs.build_api.outputs.telemetry }}

  deploy_web_prod:
    needs: [build_web, deploy_web_dev]
    if: |
      always() &&
      needs.deploy_web_dev.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: nais/deploy/actions/deploy@fa754451577294aae42872a69b888b3470478ec1 # v2
        env:
          CLUSTER: prod
          RESOURCE: .nais/web.yaml
          WORKLOAD_IMAGE: ${{ needs.build_web.outputs.image }}
          VARS: .nais/vars-prod.yaml
          TELEMETRY: ${{ needs.build_web.outputs.telemetry }}
